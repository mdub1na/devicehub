user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {

    resolver 127.0.0.11;

    ##
    ## HTTP (80) — нужен для certbot
    ##
    server {
        listen 80;
        server_name
            devicehub.putmyhexon.ru
            ldap.putmyhexon.ru
            appium-grid.putmyhexon.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    ##
    ## devicehub.putmyhexon.ru
    ##
    server {
        listen 443 ssl;
        server_name devicehub.putmyhexon.ru;

        ssl_certificate     /etc/letsencrypt/live/devicehub.putmyhexon.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/devicehub.putmyhexon.ru/privkey.pem;

        ssl_session_timeout 5m;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        client_max_body_size 1024M;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location = /auth {
            proxy_pass http://devicehub-app:3000;
        }

        location ~ ^/d/devicehub-provider/(?<port>[0-9]+)/$ {
            proxy_pass http://192.168.0.106:$port/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/d/ios-provider/(?<port>[0-9]+)/$ {
            proxy_pass http://192.168.0.104:$port/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /auth/ {
            proxy_pass http://devicehub-auth:3000;
        }

        location /api/ {
            proxy_pass http://devicehub-api:3000;
        }

        location /s/image/ {
            proxy_pass http://devicehub-storage-plugin-image:3000;
        }

        location /s/apk/ {
            proxy_pass http://devicehub-storage-plugin-apk:3000;
        }

        location /s/ {
            client_max_body_size 2048m;
            proxy_pass http://devicehub-storage-temp:3000;
        }

        location /socket.io/ {
            proxy_pass http://devicehub-websocket:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
        }

        location / {
            proxy_pass http://devicehub-app:3000;
        }
    }

    ##
    ## ldap.putmyhexon.ru
    ##
    server {
        listen 443 ssl;
        server_name ldap.putmyhexon.ru;

        ssl_certificate     /etc/letsencrypt/live/devicehub.putmyhexon.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/devicehub.putmyhexon.ru/privkey.pem;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://192.168.0.106:8081;
            proxy_ssl_verify off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
        }
    }

    ##
    ## appium-grid.putmyhexon.ru
    ##
    server {
        listen 443 ssl;
        server_name appium-grid.putmyhexon.ru;

        ssl_certificate     /etc/letsencrypt/live/devicehub.putmyhexon.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/devicehub.putmyhexon.ru/privkey.pem;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://192.168.0.104:4444;
        }
    }
}