networks:
  ldap_network:
    driver: bridge

services:
  openldap:
    image: osixia/openldap:latest
    container_name: openldap
    restart: unless-stopped
    networks:
      - ldap_network
    ports:
      - 389:389
    environment:
      - LDAP_ORGANISATION=putmyhexon
      - LDAP_DOMAIN=ldap.putmyhexon.ru
      - LDAP_ADMIN_PASSWORD=prise354
      - LDAP_BASE_DN=DC=ldap,DC=putmyhexon,DC=ru
      - LDAP_TLS=false
    volumes:
      - /home/hex354/ldap/database:/var/lib/ldap:rw
      - /home/hex354/ldap/config:/etc/ldap/slapd.d:rw
  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: phpldapadmin
    restart: unless-stopped
    hostname: utils
    networks:
      - ldap_network
    ports:
      - 8081:80
    depends_on:
      - openldap
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=openldap
      - PHPLDAPADMIN_HTTPS=false