apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cert-manager
  namespace: kube-system
spec:
  repo: https://charts.jetstack.io
  chart: cert-manager
  version: v1.20.1
  targetNamespace: cert-manager
  createNamespace: true
  valuesContent: |-
    installCRDs: true
    prometheus:
      enabled: false
