apiVersion: apps/v1
kind: Deployment
metadata:
  name: adbd
  labels:
    app.kubernetes.io/name: adbd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adbd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adbd
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: devicehub.role
                    operator: In
                    values:
                      - android
      containers:
        - name: adbd
          image: devicefarmer/adb:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          ports:
            - name: adb
              containerPort: 5037
          readinessProbe:
            tcpSocket:
              port: 5037
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 5037
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: usb-bus
              mountPath: /dev/bus/usb
      volumes:
        - name: usb-bus
          hostPath:
            path: /dev/bus/usb
            type: Directory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devicehub-provider
  labels:
    app.kubernetes.io/name: devicehub-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: devicehub-provider
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devicehub-provider
      annotations:
        devicehub/config-revision: "android-layer-v1"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: devicehub.role
                    operator: In
                    values:
                      - android
      initContainers:
        - name: wait-adbd
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              for i in $(seq 1 90); do
                nc -z adbd 5037 && exit 0
                sleep 2
              done
              exit 1
      containers:
        - name: devicehub-provider
          image: vkcom/devicehub:v1.5.2
          imagePullPolicy: IfNotPresent
          command:
            - stf
            - provider
            - --name
            - devicehub-provider
            - --adb-host
            - adbd
            - --no-cleanup
            - --connect-sub
            - tcp://devicehub-triproxy-dev:7250
            - --connect-push
            - tcp://devicehub-triproxy-dev:7270
            - --storage-url
            - http://devicehub-storage-plugin-apk:3000/
            - --public-ip
            - devicehub.putmyhexon.ru
            - --min-port
            - "12010"
            - --max-port
            - "12040"
            - --heartbeat-interval
            - "10000"
            - --screen-ws-url-pattern
            - wss://devicehub.putmyhexon.ru/d/devicehub-provider/<%= publicPort %>/
            - --secret
            - nosecret
          envFrom:
            - configMapRef:
                name: devicehub-env
