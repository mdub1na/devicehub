---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devicehub-storage-temp
  labels:
    app.kubernetes.io/name: devicehub-storage-temp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: devicehub-storage-temp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devicehub-storage-temp
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: devicehub.role
                    operator: In
                    values:
                      - storage
      containers:
        - name: devicehub-storage-temp
          image: vkcom/devicehub:v1.5.2
          imagePullPolicy: IfNotPresent
          command:
            - stf
            - storage-temp
            - --port
            - "3000"
            - --save-dir
            - /tmp
            - --connect-sub
            - tcp://devicehub-triproxy-app:7150
            - --connect-push
            - tcp://devicehub-triproxy-app:7170
            - --secret
            - nosecret
          envFrom:
            - configMapRef:
                name: devicehub-env
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: storage-temp-data
              mountPath: /tmp
      volumes:
        - name: storage-temp-data
          persistentVolumeClaim:
            claimName: devicehub-storage-temp-pvc
---
