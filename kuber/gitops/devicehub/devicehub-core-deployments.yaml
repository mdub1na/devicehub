apiVersion: apps/v1
kind: Deployment
metadata:
  name: devicehub-triproxy-app
  labels:
    app.kubernetes.io/name: devicehub-triproxy-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: devicehub-triproxy-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devicehub-triproxy-app
    spec:
      containers:
        - name: devicehub-triproxy-app
          image: vkcom/devicehub:v1.5.2
          imagePullPolicy: IfNotPresent
          command:
            - stf
            - triproxy
            - app001
            - --bind-pub
            - tcp://*:7150
            - --bind-dealer
            - tcp://*:7160
            - --bind-pull
            - tcp://*:7170
          envFrom:
            - configMapRef:
                name: devicehub-env
          ports:
            - name: pub
              containerPort: 7150
            - name: dealer
              containerPort: 7160
            - name: pull
              containerPort: 7170
---
