apiVersion: v1
kind: ConfigMap
metadata:
  name: devicehub-dynamic-proxy-nginx
data:
  nginx.conf: |
    worker_processes  1;

    events {
      worker_connections  1024;
    }

    http {
      server {
        listen 8080;
        resolver 10.43.0.10 valid=10s ipv6=off;

        location ~ ^/d/(?<stfprovider>[^/]+)/(?<port>[0-9]+)/$ {
          proxy_pass http://$stfprovider.devicehub.svc.cluster.local:$port/;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "Upgrade";
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
          return 404;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devicehub-dynamic-proxy
  labels:
    app.kubernetes.io/name: devicehub-dynamic-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: devicehub-dynamic-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devicehub-dynamic-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config
          configMap:
            name: devicehub-dynamic-proxy-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: devicehub-dynamic-proxy
  labels:
    app.kubernetes.io/name: devicehub-dynamic-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: devicehub-dynamic-proxy
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
