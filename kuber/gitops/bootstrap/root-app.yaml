apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devicehub-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:mdub1na/devicehub.git
    targetRevision: kuber
    path: kuber/gitops/root
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
