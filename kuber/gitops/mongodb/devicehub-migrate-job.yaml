apiVersion: batch/v1
kind: Job
metadata:
  name: devicehub-migrate
  labels:
    app.kubernetes.io/name: devicehub-migrate
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devicehub-migrate
    spec:
      restartPolicy: OnFailure
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: devicehub.role
                    operator: In
                    values:
                      - storage
      initContainers:
        - name: wait-replicaset
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              MONGO_URI="mongodb://devicehub-mongo.mongodb.svc.cluster.local:27017/admin"
              for i in {1..120}; do
                RS_OK="$(mongosh "${MONGO_URI}" --quiet --eval 'try { rs.status().ok } catch (e) { 0 }')"
                if [ "${RS_OK}" = "1" ]; then
                  exit 0
                fi
                sleep 2
              done
              echo "Replica set is not ready."
              exit 1
      containers:
        - name: migrate
          image: vkcom/devicehub:v1.5.2
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGODB_PORT_27017_TCP
              value: mongodb://devicehub-mongo.mongodb.svc.cluster.local:27017
          command:
            - stf
            - migrate
