apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-init
  labels:
    app.kubernetes.io/name: mongodb-init
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb-init
    spec:
      restartPolicy: OnFailure
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: devicehub.role
                    operator: In
                    values:
                      - storage
      containers:
        - name: mongodb-init
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail

              MONGO_HOST="devicehub-mongo.mongodb.svc.cluster.local:27017"
              MONGO_URI="mongodb://${MONGO_HOST}/admin"
              RS_MEMBER_HOST="devicehub-mongo-0.devicehub-mongo.mongodb.svc.cluster.local:27017"

              echo "Waiting for MongoDB to accept connections..."
              for i in {1..90}; do
                if mongosh "${MONGO_URI}" --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep -q 1; then
                  break
                fi
                sleep 2
              done

              RS_OK="$(mongosh "${MONGO_URI}" --quiet --eval 'try { rs.status().ok } catch (e) { 0 }')"
              if [ "${RS_OK}" = "1" ]; then
                CURRENT_HOST="$(mongosh "${MONGO_URI}" --quiet --eval 'try { rs.conf().members[0].host } catch (e) { "" }')"
                if [ "${CURRENT_HOST}" != "${RS_MEMBER_HOST}" ]; then
                  echo "Replica set host mismatch (${CURRENT_HOST} != ${RS_MEMBER_HOST}), applying reconfig..."
                  mongosh "${MONGO_URI}" --quiet --eval "cfg=rs.conf(); cfg.members[0].host='${RS_MEMBER_HOST}'; cfg.version=cfg.version+1; rs.reconfig(cfg, { force: true })"
                fi
                echo "Replica set is already initialized."
                exit 0
              fi

              CURRENT_HOST="$(mongosh "${MONGO_URI}" --quiet --eval 'try { rs.conf().members[0].host } catch (e) { "" }')"
              if [ -n "${CURRENT_HOST}" ]; then
                echo "Replica set exists but is unhealthy, forcing host reconfig to ${RS_MEMBER_HOST}..."
                mongosh "${MONGO_URI}" --quiet --eval "cfg=rs.conf(); cfg.members[0].host='${RS_MEMBER_HOST}'; cfg.version=cfg.version+1; rs.reconfig(cfg, { force: true })"
              else
                echo "Initializing replica set devicehub-rs..."
                mongosh "${MONGO_URI}" --quiet <<EOF
                rs.initiate({
                  _id: "devicehub-rs",
                  members: [
                    {
                      _id: 0,
                      host: "${RS_MEMBER_HOST}",
                      priority: 2
                    }
                  ]
                })
                EOF
              fi

              echo "Waiting for replica set readiness..."
              for i in {1..60}; do
                RS_PRIMARY="$(mongosh "${MONGO_URI}" --quiet --eval 'try { db.hello().isWritablePrimary ? 1 : 0 } catch (e) { 0 }')"
                if [ "${RS_PRIMARY}" = "1" ]; then
                  echo "Replica set initialized."
                  exit 0
                fi
                sleep 2
              done

              echo "Replica set initialization timed out."
              exit 1
